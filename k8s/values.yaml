name: auth
replicaCount: 1
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%
image:
  name: maheshnandi/organistation-auth
  tag: v1.0.0
  pullPolicy: IfNotPresent
service:
  port: 8001
  targetPort: 8001
  healthPath: /api/auth/health
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
